name: Build & Deploy to EC2

on:
  # EC2 SSH is restricted to the operator workstation.
  # Deploy from this machine with the local key, or temporarily open SG 22
  # before running this workflow manually.
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: Build (Next.js standalone — Linux runner avoids EC2 OOM)
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Assemble standalone
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/ 2>/dev/null || true

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ec2
          chmod 600 ~/.ssh/ec2
          ssh-keyscan -T 5 -H "43.202.246.97" >> ~/.ssh/known_hosts || echo "ssh-keyscan timeout — proceeding with StrictHostKeyChecking=no"

      - name: Rsync standalone artifact
        env:
          EC2_HOST: 43.202.246.97
          REMOTE_DIR: /var/www/dnfm-newb
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/ec2 -o StrictHostKeyChecking=no" \
            .next/standalone/ \
            ec2-user@${EC2_HOST}:${REMOTE_DIR}/.next/standalone/

      - name: PM2 restart
        env:
          EC2_HOST: 43.202.246.97
        run: |
          ssh -i ~/.ssh/ec2 -o StrictHostKeyChecking=no \
            ec2-user@${EC2_HOST} \
            'cd /var/www/dnfm-newb && env HOSTNAME=127.0.0.1 PORT=3000 NODE_ENV=production pm2 reload ecosystem.config.cjs --update-env --no-color && sleep 3 && pm2 status dnfm-newb --no-color | head -7'

      - name: Smoke test
        env:
          EC2_HOST: 43.202.246.97
        run: |
          ssh -i ~/.ssh/ec2 -o StrictHostKeyChecking=no \
            ec2-user@${EC2_HOST} \
            'curl -sk -H "Host: dnfm.kr" https://127.0.0.1/ -o /dev/null -w "home %{http_code}\n"'
